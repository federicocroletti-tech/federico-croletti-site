<section class="section cookie-policy-page">
  <div class="page-heading">
    <p class="eyebrow">{{ 'cookiePolicy.eyebrow' | translate }}</p>
    <h1>{{ 'cookiePolicy.title' | translate }}</h1>
    <p class="lead">{{ 'cookiePolicy.intro' | translate }}</p>
  </div>

  <div class="policy-list">
    @for (section of sections; track section) {
      <mat-card class="site-card">
        <mat-card-header>
          <mat-card-title>{{ section + '.title' | translate }}</mat-card-title>
        </mat-card-header>
        <mat-card-content>
          <p>{{ section + '.body' | translate }}</p>
        </mat-card-content>
      </mat-card>
    }
  </div>
</section>
