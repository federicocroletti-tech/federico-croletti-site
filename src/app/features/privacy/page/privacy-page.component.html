<section class="section privacy-page">
  <div class="page-heading">
    <p class="eyebrow">{{ 'privacy.eyebrow' | translate }}</p>
    <h1>{{ 'privacy.title' | translate }}</h1>
    <p class="lead">{{ 'privacy.intro' | translate }}</p>
  </div>

  <div class="privacy-list">
    @for (section of sections; track section) {
      <mat-card class="site-card">
        <mat-card-header>
          <mat-card-title>{{ section + '.title' | translate }}</mat-card-title>
        </mat-card-header>
        <mat-card-content>
          <p>{{ section + '.body' | translate }}</p>
        </mat-card-content>
      </mat-card>
    }
  </div>
</section>
