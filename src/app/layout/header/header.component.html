<a class="skip-link" href="#main-content">{{ 'common.skipToContent' | translate }}</a>

<header class="site-header">
  <a class="brand" routerLink="/" [attr.aria-label]="'navigation.home' | translate">
    <img
      src="/assets/images/brand/federico-mark-primary.png"
      alt=""
      aria-hidden="true"
      width="48"
      height="32"
    />
    <span>Federico Croletti</span>
  </a>

  <input class="nav-toggle" id="site-nav-toggle" type="checkbox" aria-hidden="true" />
  <label
    class="nav-toggle-button"
    for="site-nav-toggle"
    [attr.aria-label]="'navigation.label' | translate"
    aria-controls="site-navigation"
  >
    <span aria-hidden="true"></span>
    <span aria-hidden="true"></span>
    <span aria-hidden="true"></span>
  </label>

  <nav id="site-navigation" class="navigation" [attr.aria-label]="'navigation.label' | translate">
    @for (item of navigationItems; track item.path) {
      <a
        mat-button
        [routerLink]="item.path"
        routerLinkActive="is-active"
        [routerLinkActiveOptions]="{ exact: item.path === '/' }"
      >
        {{ item.labelKey | translate }}
      </a>
    }

    <app-language-switcher class="nav-language" />
  </nav>

  <app-language-switcher class="header-language" />
</header>
